name: Dev -> Deploy & Sync

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy build to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          keep_files: false

      - name: Try merge `dev` into `main`
        id: try_merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git fetch origin main
          git fetch origin $BRANCH:$BRANCH
          git checkout main
          git pull origin main
          if git merge --no-edit $BRANCH; then
            git push origin main
            echo "MERGE_STATUS=merged" >> $GITHUB_OUTPUT
          else
            git merge --abort || true
            git reset --hard origin/main
            echo "MERGE_STATUS=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if merge failed
        if: steps.try_merge.outputs.MERGE_STATUS == 'conflict'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR: Merge ${{ github.ref_name }} into main (manual resolution required)"
          commit-message: "chore: create PR to merge ${{ github.ref_name }} into main"
          base: main
          head: ${{ github.ref_name }}
